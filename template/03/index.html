<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doc2Brief 模板预览</title>
  <style id="template-inline-style">__TEMPLATE_STYLE__</style>
</head>
<body data-template-id="template-03">
  <div id="j-progress"><div id="j-progress-bar"></div></div>
  <button id="j-btt" title="返回顶部">↑</button>

  <div class="j-paper">
    <header class="j-masthead">
      <div class="mh-topband"></div>
      <div class="mh-main">
        <div class="mh-left">
          <div class="mh-org-name" id="np-org-name">Doc2Brief Weekly Bulletin</div>
          <div class="mh-dept-name" id="np-dept-name">自动生成周报</div>
          <div class="mh-left-rule"></div>
        </div>

        <div class="mh-center">
          <div class="mh-vol" id="np-vol-info">Vol.2026 · No.01 · Weekly</div>
          <div class="mh-title" id="np-title">工作周报</div>
          <div class="mh-title-deco">
            <span></span>
            <em id="np-title-en">Weekly Work Report</em>
            <span></span>
          </div>
        </div>

        <div class="mh-right">
          <div class="mh-issue-label">ISSUE</div>
          <div class="mh-issue-num" id="np-issue-number">01</div>
          <div class="mh-date-range" id="np-date-range">本周周期</div>
          <div class="mh-week-label" id="np-week-label">第 01 期</div>
        </div>
      </div>

      <div class="mh-foot">
        <span class="mh-foot-info" id="np-editorial-info">主办：自动生成周报</span>
        <span class="mh-foot-motto" id="np-motto">事实、进展、风险、计划</span>
        <span class="mh-foot-badge" id="np-badge">内部资料 · 请勿外传</span>
      </div>
      <div class="mh-bottomband"><b></b><b></b><b></b></div>
    </header>

    <nav class="j-toc" id="j-toc">
      <div class="toc-badge">本期目录</div>
      <div class="toc-links" id="np-toc-links"></div>
    </nav>

    <section class="j-note j-reveal" id="s-note">
      <div class="note-side">
        <div class="note-side-line"></div>
        <div class="note-side-cn">本期导读</div>
        <div class="note-side-line"></div>
      </div>
      <div class="note-body">
        <div class="note-eyebrow" id="np-note-eyebrow">Editor's Note</div>
        <p class="note-text" id="np-note-text">暂无导读内容。</p>
      </div>
    </section>

    <main class="j-grid" id="np-main-grid"></main>

    <footer class="j-footer">
      <div class="ft-band"><b></b><b></b><b></b><b></b><b></b></div>
      <div class="ft-body">
        <div class="ft-l" id="np-footer-dept">自动生成周报</div>
        <div class="ft-c">
          <span id="np-footer-cn">本刊为内部资料，仅供工作参考，请妥善保管，未经许可不得对外传阅</span><br />
          <span id="np-footer-en">Internal Use Only · Weekly Report Template</span>
        </div>
        <div class="ft-r">
          <span id="np-footer-issue">第 01 期</span><br />
          <span id="np-footer-date">出版日期：2026-04-17</span>
        </div>
      </div>
    </footer>
  </div>

  <script id="template-data" type="application/json">__TEMPLATE_DATA__</script>
  <script id="template-script" type="application/json">__TEMPLATE_SCRIPT__</script>
  <script>
    (() => {
      const styleNode = document.getElementById('template-inline-style')
      const dataNode = document.getElementById('template-data')
      const scriptNode = document.getElementById('template-script')
      const isLivePreview =
        styleNode?.textContent.includes('__TEMPLATE_STYLE__') ||
        dataNode?.textContent.includes('__TEMPLATE_DATA__') ||
        scriptNode?.textContent.includes('__TEMPLATE_SCRIPT__')

      if (isLivePreview) {
        const loader = document.createElement('script')
        loader.src = '../_runtime/live-preview.js'
        loader.dataset.templateId = document.body.dataset.templateId || ''
        loader.dataset.styleHref = './style.css'
        loader.dataset.scriptSrc = './app.js'
        document.body.appendChild(loader)
        return
      }

      const runtimeScript = document.createElement('script')
      runtimeScript.textContent = scriptNode?.textContent || ''
      document.body.appendChild(runtimeScript)
    })()
  </script>
</body>
</html>
